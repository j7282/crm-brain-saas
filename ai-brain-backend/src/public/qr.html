<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darwin J7282 - Conectar WhatsApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0b141a; color: #e9edef; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { text-align: center; max-width: 500px; padding: 40px; }
    h1 { font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, #00a884, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #8696a0; margin-bottom: 24px; font-size: 0.95rem; }
    #qr-img { max-width: 280px; border-radius: 12px; margin: 20px auto; display: block; border: 3px solid #00a884; }
    .status { padding: 10px 20px; border-radius: 8px; font-weight: 600; margin-top: 16px; display: inline-block; }
    .status.qr { background: rgba(0,168,132,0.15); color: #00a884; }
    .status.connected { background: rgba(0,168,132,0.3); color: #00ff88; }
    .status.connecting { background: rgba(255,152,0,0.15); color: #ff9800; }
    .status.disconnected { background: rgba(255,0,0,0.15); color: #ff4444; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧬 Darwin J7282</h1>
    <p>Escanea el código QR con tu WhatsApp para iniciar la clonación neuronal.</p>
    <div id="content">
      <div class="status connecting pulse">⏳ Conectando...</div>
    </div>
  </div>
  <script>
    async function checkQR() {
      try {
        const res = await fetch('/api/whatsapp/qr-public');
        const data = await res.json();
        const el = document.getElementById('content');
        
        if (data.status === 'qr' && data.qr) {
          el.innerHTML = `
            <img id="qr-img" src="${data.qr}" alt="QR Code" />
            <div class="status qr">📱 Escanea con WhatsApp</div>
          `;
        } else if (data.status === 'connected') {
          el.innerHTML = `
            <div style="font-size: 4rem; margin: 20px 0;">✅</div>
            <div class="status connected">🚀 ¡WhatsApp Conectado! Darwin está vivo.</div>
            <p style="margin-top: 16px; color: #8696a0;">Ya puedes cerrar esta pestaña y usar el Dashboard.</p>
          `;
        } else if (data.status === 'connecting') {
          el.innerHTML = `<div class="status connecting pulse">⏳ Generando QR...</div>`;
        } else {
          el.innerHTML = `<div class="status disconnected">❌ Desconectado. Esperando nuevo QR...</div>`;
        }
      } catch (e) {
        document.getElementById('content').innerHTML = `<div class="status disconnected">❌ Backend no disponible en puerto 3000</div>`;
      }
    }
    checkQR();
    setInterval(checkQR, 3000);
  </script>
</body>
</html>
